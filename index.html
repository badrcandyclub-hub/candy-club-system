<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>سيستم كاندي كلوب الاحترافي</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

    <header class="app-header">
        <div class="logo">🍬 Candy Club</div>
        <div class="status-dot"></div>
    </header>

    <main class="app-content">
        
        <section id="orders-tab" class="tab-pane active">
            <div class="section-card">
                <h3 class="section-title">📝 إضافة طلب جديد</h3>
                <form id="orderForm">
                    <label>منصة الطلب:</label>
                    <select id="platform" required>
                        <option value="واتساب ✅">واتساب ✅</option>
                        <option value="فيسبوك 🔵">فيسبوك 🔵</option>
                        <option value="إنستجرام 📸">إنستجرام 📸</option>
                        <option value="تيك توك 🖤">تيك توك 🖤</option>
                    </select>

                    <label>اسم العميل:</label>
                    <input type="text" id="customerName" placeholder="الاسم بالكامل" required>

                    <div class="form-row">
                        <div class="form-group">
                            <label>رقم التواصل:</label>
                            <input type="tel" id="phone1" placeholder="01xxxxxxxxx" required>
                        </div>
                        <div class="form-group">
                            <label>رقم آخر (اختياري):</label>
                            <input type="tel" id="phone2" placeholder="رقم بديل">
                        </div>
                    </div>

                    <label>المحافظة / المنطقة:</label>
                    <select id="governorate" required>
                        <option value="">-- اختر المنطقة --</option>
                        </select>

                    <label>العنوان بالتفصيل:</label>
                    <textarea id="address" placeholder="الشارع، رقم البيت، الدور، علامة مميزة" required></textarea>

                    <div class="divider">المنتجات</div>
                    <div id="productsContainer">
                        </div>
                    <button type="button" id="addProductBtn" class="btn-add-pro">+ إضافة منتج</button>

                    <div class="totals-box">
                        <div class="total-item"><span>إجمالي المنتجات:</span> <input type="number" id="productsTotal" value="0" readonly></div>
                        <div class="total-item"><span>الخصم:</span> <input type="number" id="discount" value="0"></div>
                        <div class="total-item"><span>سعر الشحن:</span> <input type="number" id="shippingCost" value="0"></div>
                        <div class="final-amount">الإجمالي: <span id="finalTotalDisplay">0</span> ج.م</div>
                        <div class="delivery-prediction">📅 التوصيل المتوقع: <span id="expectedDateDisplay">--</span></div>
                    </div>

                    <label>ملاحظات إضافية:</label>
                    <textarea id="notes" placeholder="ملاحظات للطيار أو التغليف"></textarea>

                    <div class="action-grid">
                        <button type="button" id="saveBtn" class="btn-save">💾 حفظ في الشيت</button>
                        <button type="button" id="printBtn" class="btn-print">🖨️ فاتورة</button>
                    </div>
                </form>
            </div>
        </section>

        <section id="couriers-tab" class="tab-pane">
            <div class="section-card">
                <h3 class="section-title">🚚 تحميل المناديب</h3>
                <div class="driver-selection">
                    <label>اختر المندوب:</label>
                    <select id="driverNameSelect">
                        <option value="">-- اختر مندوب --</option>
                        <option value="أحمد">أحمد</option>
                        <option value="محمد">محمد</option>
                    </select>
                </div>
                <div id="pendingOrders">
                    <p class="info-msg">سيتم عرض الأوردرات الجاهزة للتحميل هنا...</p>
                </div>
            </div>
        </section>

        <section id="reports-tab" class="tab-pane">
            <div class="stats-container">
                <div class="stat-card">
                    <span class="stat-label">أوردرات اليوم</span>
                    <span class="stat-value" id="todayCount">0</span>
                </div>
                <div class="stat-card">
                    <span class="stat-label">مبيعات اليوم</span>
                    <span class="stat-value" id="todaySales">0</span>
                </div>
            </div>
            <div class="section-card">
                <h3 class="section-title">🔍 بحث عن أوردر</h3>
                <div class="search-wrap">
                    <input type="text" id="orderSearch" placeholder="رقم الأوردر أو تليفون العميل">
                    <button id="searchBtn" class="btn-save">بحث</button>
                </div>
                <div id="searchResultArea"></div>
            </div>
        </section>

        <section id="shipping-tab" class="tab-pane">
            <div class="shipping-grid">
                <div class="ship-card alex">
                    <h3>⚓ الإسكندرية</h3>
                    <div id="alexShippingList"></div>
                    <button class="btn-mini" onclick="addNewShippingRow('alex')">+ منطقة</button>
                </div>
                <div class="ship-card govs">
                    <h3>🚚 المحافظات</h3>
                    <div id="govsShippingList"></div>
                    <button class="btn-mini" onclick="addNewShippingRow('govs')">+ محافظة</button>
                </div>
            </div>
            <button id="saveShippingBtn" class="btn-save full-width">💾 حفظ أسعار الشحن</button>
        </section>

    </main>

    <nav class="bottom-nav">
        <button class="nav-item active" data-target="orders-tab">
            <span class="nav-icon">📝</span>
            <span class="nav-text">الطلبات</span>
        </button>
        <button class="nav-item" data-target="couriers-tab">
            <span class="nav-icon">🚚</span>
            <span class="nav-text">المناديب</span>
        </button>
        <button class="nav-item" data-target="reports-tab">
            <span class="nav-icon">📊</span>
            <span class="nav-text">التقارير</span>
        </button>
        <button class="nav-item" data-target="shipping-tab">
            <span class="nav-icon">⚙️</span>
            <span class="nav-text">الشحن</span>
        </button>
    </nav>

    <div id="receipt-print-area"></div>

    <script src="app.js"></script>
</body>
</html>
